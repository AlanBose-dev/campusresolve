<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusResolve</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Import Map for Firebase (Ensures firebase.js imports work in browser) -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }

        /* Smooth Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Animations */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Checkmark Animation */
        @keyframes drawCheck {
            0% { stroke-dashoffset: 20; }
            100% { stroke-dashoffset: 0; }
        }

        .animate-enter { animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-spin-slow { animation: spin 1s linear infinite; }

        /* Floating Label Logic */
        .floating-input:placeholder-shown + label {
            transform: translateY(0) scale(1);
            color: #94a3b8;
        }
        .floating-input:not(:placeholder-shown) + label,
        .floating-input:focus + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: var(--accent-color);
        }

        /* Gradient Background Animation */
        .animated-bg {
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Custom Select Arrow */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden animated-bg bg-gradient-to-br from-indigo-50 via-slate-100 to-indigo-100">

    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-200/30 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-200/30 rounded-full blur-3xl"></div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-lg relative z-10 animate-enter my-10">
        
        <!-- Back Link -->
        <a href="role-select.html" class="inline-flex items-center text-sm text-slate-500 hover:text-slate-800 mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Change Role
        </a>

        <!-- Registration Card -->
        <div class="glass-card rounded-2xl p-8 sm:p-10 relative overflow-hidden">
            
            <!-- Top Accent Line (Dynamic Color) -->
            <div id="accent-line" class="absolute top-0 left-0 w-full h-1.5 bg-slate-400"></div>

            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900">Create Account</h1>
                
                <!-- Role Badge (Critical UX) -->
                <div id="role-badge-container" class="mt-3 flex justify-center">
                    <div id="role-badge" class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold tracking-wide uppercase shadow-sm transition-all bg-slate-100 text-slate-600">
                        <i id="role-icon" class="fa-solid fa-user mr-2"></i> 
                        <span id="role-text">User</span>
                    </div>
                </div>
            </div>

            <!-- Registration Form -->
            <form id="register-form" class="space-y-5">
                
                <!-- 1. Common Fields -->
                <div class="relative">
                    <input type="text" id="fullName" required 
                           class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 focus:border-transparent transition-all placeholder-transparent" 
                           placeholder="John Doe">
                    <label for="fullName" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">
                        Full Name
                    </label>
                </div>

                <div class="relative">
                    <input type="email" id="email" required 
                           class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 focus:border-transparent transition-all placeholder-transparent" 
                           placeholder="name@example.com">
                    <label for="email" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">
                        Email Address
                    </label>
                </div>

                <!-- 2. Role Specific Fields Container (Injected via JS) -->
                <div id="dynamic-fields" class="space-y-5">
                    <!-- Dynamic content will be loaded here based on role -->
                </div>

                <!-- 3. Password Fields -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div class="relative">
                        <input type="password" id="password" required minlength="6"
                               class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 focus:border-transparent transition-all placeholder-transparent" 
                               placeholder="Password">
                        <label for="password" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">
                            Password
                        </label>
                    </div>
                    <div class="relative">
                        <input type="password" id="confirmPassword" required minlength="6"
                               class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 focus:border-transparent transition-all placeholder-transparent" 
                               placeholder="Confirm">
                        <label for="confirmPassword" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">
                            Confirm
                        </label>
                    </div>
                </div>

                <!-- Error Message Container -->
                <div id="error-message" class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-lg border border-red-100 flex items-start gap-2">
                    <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                    <span><!-- Error text injected here --></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="w-full py-3.5 px-4 rounded-lg text-white font-semibold shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-1 transition-all transform hover:-translate-y-0.5 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-2">
                    <span>Create Account</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </form>

            <!-- Footer Links -->
            <div class="mt-8 text-center text-sm text-slate-500">
                <span>
                    Already have an account? 
                    <a href="#" id="login-link" class="font-semibold hover:underline decoration-2 underline-offset-2 transition-colors">Login here</a>
                </span>
            </div>
        </div>
    </main>

    <!-- JavaScript Logic -->
    <script type="module">
        // Import from SDKs using Import Map
        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "firebase/auth";
        import { getFirestore, doc, setDoc, serverTimestamp } from "firebase/firestore";
        
        // Import config from local file (which works because of module type)
        import { app, auth, db } from './firebase.js';

        // ---------------------------------------------------------------------
        // 1. ROLE CONFIGURATION & VALIDATION
        // ---------------------------------------------------------------------
        const params = new URLSearchParams(window.location.search);
        let currentRole = params.get('role');

        // Fallback: Check session storage
        if (!currentRole) {
            currentRole = sessionStorage.getItem('selectedRole');
        }

        // Security: Prevent Admin registration or undefined roles
        const allowedRoles = ['student', 'staff', 'worker'];
        if (!currentRole || !allowedRoles.includes(currentRole)) {
            // Redirect unauthorized users back to selection
            window.location.href = 'role-select.html';
        }

        // Role Metadata
        const roleConfig = {
            student: { 
                name: 'Student', 
                color: 'indigo', 
                icon: 'fa-graduation-cap',
                cssVar: '#4f46e5',
                dash: 'student-dashboard.html'
            },
            staff: { 
                name: 'Faculty / Staff', 
                color: 'violet', 
                icon: 'fa-chalkboard-user',
                cssVar: '#7c3aed',
                dash: 'staff-dashboard.html'
            },
            worker: { 
                name: 'Maintenance Worker', 
                color: 'teal', 
                icon: 'fa-helmet-safety',
                cssVar: '#0d9488',
                dash: 'worker-dashboard.html'
            }
        };
        const config = roleConfig[currentRole];

        // ---------------------------------------------------------------------
        // 2. UI INITIALIZATION
        // ---------------------------------------------------------------------
        
        // Apply Theme Colors
        document.documentElement.style.setProperty('--accent-color', config.cssVar);
        
        // Update Accent Line & Badge
        document.getElementById('accent-line').className = `absolute top-0 left-0 w-full h-1.5 bg-${config.color}-500`;
        const badge = document.getElementById('role-badge');
        badge.className = `inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold tracking-wide uppercase shadow-sm transition-all bg-${config.color}-50 text-${config.color}-600 border border-${config.color}-100`;
        document.getElementById('role-icon').className = `fa-solid ${config.icon} mr-2`;
        document.getElementById('role-text').textContent = config.name;

        // Update Button Style
        const btn = document.getElementById('submit-btn');
        btn.className = `w-full py-3.5 px-4 rounded-lg text-white font-semibold shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-${config.color}-500 focus:ring-offset-1 transition-all transform hover:-translate-y-0.5 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-2 bg-${config.color}-600 hover:bg-${config.color}-700`;

        // Update Login Link
        const loginLink = document.getElementById('login-link');
        loginLink.href = `login.html?role=${currentRole}`;
        loginLink.className = `font-semibold text-${config.color}-600 hover:text-${config.color}-800 hover:underline decoration-2 underline-offset-2 transition-colors`;

        // ---------------------------------------------------------------------
        // 3. DYNAMIC FORM FIELDS GENERATION
        // ---------------------------------------------------------------------
        const dynamicContainer = document.getElementById('dynamic-fields');
        let html = '';

        if (currentRole === 'student') {
            html = `
                <div class="relative">
                    <select id="department" required class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all appearance-none">
                        <option value="" disabled selected></option>
                        <option value="Computer Science">Computer Science (CSE)</option>
                        <option value="Electronics">Electronics (ECE)</option>
                        <option value="Mechanical">Mechanical (ME)</option>
                        <option value="Civil">Civil (CE)</option>
                        <option value="Biotech">Biotechnology</option>
                    </select>
                    <label for="department" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">Department</label>
                </div>
                <div class="relative">
                    <input type="text" id="rollNumber" required class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder-transparent" placeholder="Roll No">
                    <label for="rollNumber" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">Student ID / Roll No</label>
                </div>
            `;
        } else if (currentRole === 'staff') {
            html = `
                <div class="relative">
                    <select id="department" required class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all appearance-none">
                        <option value="" disabled selected></option>
                        <option value="CSE Dept">CSE Dept</option>
                        <option value="ECE Dept">ECE Dept</option>
                        <option value="ME Dept">ME Dept</option>
                        <option value="Admin Office">Admin Office</option>
                        <option value="Library">Library</option>
                    </select>
                    <label for="department" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">Department / Office</label>
                </div>
                <div class="relative">
                    <input type="text" id="designation" required class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all placeholder-transparent" placeholder="Designation">
                    <label for="designation" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">Designation</label>
                </div>
            `;
        } else if (currentRole === 'worker') {
            html = `
                <div class="relative">
                    <select id="workType" required class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all appearance-none">
                        <option value="" disabled selected></option>
                        <option value="Electrical">Electrician</option>
                        <option value="Plumbing">Plumber</option>
                        <option value="Carpentry">Carpenter</option>
                        <option value="Cleaning">Housekeeping / Cleaning</option>
                        <option value="AC Repair">AC Technician</option>
                        <option value="Civil Work">Civil Worker</option>
                    </select>
                    <label for="workType" class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">Specialization / Trade</label>
                </div>
            `;
        }
        
        dynamicContainer.innerHTML = html;

        // ---------------------------------------------------------------------
        // 4. SUBMISSION LOGIC
        // ---------------------------------------------------------------------
        const form = document.getElementById('register-form');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear Validation
            showError(null);
            
            // 1. Password Match Check
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }

            // 2. Data Collection
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            let additionalData = {};

            if (currentRole === 'student') {
                additionalData = {
                    department: document.getElementById('department').value,
                    rollNumber: document.getElementById('rollNumber').value
                };
            } else if (currentRole === 'staff') {
                additionalData = {
                    department: document.getElementById('department').value,
                    designation: document.getElementById('designation').value
                };
            } else if (currentRole === 'worker') {
                additionalData = {
                    workType: document.getElementById('workType').value,
                    status: 'available' // Default status for workers
                };
            }

            setLoading(true);

            try {
                // 3. Create Firebase Auth User
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 4. Update Auth Profile (Display Name)
                await updateProfile(user, {
                    displayName: fullName
                });

                // 5. Store Extended Profile in Firestore
                // Path: /users/{uid}
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    fullName: fullName,
                    email: email,
                    role: currentRole,
                    createdAt: serverTimestamp(),
                    ...additionalData
                });

                // 6. Success & Redirect
                showSuccess();
                
                // Delay for animation
                setTimeout(() => {
                    window.location.href = config.dash;
                }, 1500);

            } catch (error) {
                console.error("Registration Error:", error);
                
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    msg = "This email is already registered. Please login.";
                } else if (error.code === 'auth/weak-password') {
                    msg = "Password should be at least 6 characters.";
                } else if (error.code === 'auth/invalid-email') {
                    msg = "Please enter a valid email address.";
                }

                showError(msg);
                setLoading(false);
            }
        });

        // ---------------------------------------------------------------------
        // 5. UI HELPERS
        // ---------------------------------------------------------------------
        function setLoading(isLoading) {
            const btn = document.getElementById('submit-btn');
            const span = btn.querySelector('span');
            const icon = btn.querySelector('i');

            if (isLoading) {
                btn.disabled = true;
                span.textContent = 'Creating Account...';
                icon.className = 'fa-solid fa-circle-notch animate-spin-slow';
            } else {
                btn.disabled = false;
                span.textContent = 'Create Account';
                icon.className = 'fa-solid fa-arrow-right';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            const txt = el.querySelector('span');
            
            if (msg) {
                txt.textContent = msg;
                el.classList.remove('hidden');
                el.classList.add('animate-shake');
                setTimeout(() => el.classList.remove('animate-shake'), 500);
            } else {
                el.classList.add('hidden');
            }
        }

        function showSuccess() {
            const btn = document.getElementById('submit-btn');
            btn.className = "w-full py-3.5 px-4 rounded-lg text-white font-semibold bg-green-500 shadow-md flex justify-center items-center gap-2 transition-all";
            btn.innerHTML = `<span>Account Created!</span> <i class="fa-solid fa-check"></i>`;
        }
    </script>
</body>
</html>
