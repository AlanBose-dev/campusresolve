<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusResolve</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Import Map for Firebase (REQUIRED for firebase.js to work) -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Poppins', sans-serif;
        }

        /* Smooth Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .animate-enter {
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        .animate-spin-slow {
            animation: spin 1s linear infinite;
        }

        /* Floating Label Logic */
        .floating-input:placeholder-shown+label {
            transform: translateY(0) scale(1);
            color: #94a3b8;
        }

        .floating-input:not(:placeholder-shown)+label,
        .floating-input:focus+label {
            transform: translateY(-1.5rem) scale(0.85);
            color: var(--accent-color);
        }

        /* Gradient Background Animation */
        .animated-bg {
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body
    class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden animated-bg bg-gradient-to-br from-slate-100 via-indigo-50 to-slate-100">

    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-200/30 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-200/30 rounded-full blur-3xl"></div>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-md relative z-10 animate-enter">

        <!-- Back Link -->
        <a href="role-select.html"
            class="inline-flex items-center text-sm text-slate-500 hover:text-slate-800 mb-6 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i> Select different role
        </a>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8 sm:p-10 relative overflow-hidden">

            <!-- Top Accent Line (Color set by JS) -->
            <div id="accent-line" class="absolute top-0 left-0 w-full h-1.5 bg-slate-400"></div>

            <!-- Header -->
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-slate-100 text-slate-700 text-xl mb-4 shadow-sm">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Welcome Back</h1>
                <p class="text-slate-500 text-sm mt-1">Access your <span id="role-display"
                        class="font-semibold lowercase">dashboard</span></p>

                <!-- Role Badge -->
                <div id="role-badge"
                    class="mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-wide uppercase bg-slate-100 text-slate-600">
                    <i class="fa-solid fa-user mr-2"></i> <span id="role-name">User</span>
                </div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">

                <!-- Email Input -->
                <div class="relative">
                    <input type="email" id="email" required
                        class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 focus:border-transparent transition-all placeholder-transparent"
                        placeholder="name@example.com">
                    <label for="email"
                        class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">
                        Email Address
                    </label>
                </div>

                <!-- Password Input -->
                <div class="relative">
                    <input type="password" id="password" required
                        class="floating-input block w-full px-4 py-3 text-slate-900 bg-white/50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 focus:border-transparent transition-all placeholder-transparent"
                        placeholder="Password">
                    <label for="password"
                        class="absolute left-4 top-3 text-slate-400 text-sm transition-all pointer-events-none origin-[0]">
                        Password
                    </label>
                </div>

                <!-- Error Message Container (Inline) -->
                <div id="error-message"
                    class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-lg border border-red-100 flex items-start gap-2">
                    <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                    <span><!-- Error text injected here --></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn"
                    class="w-full py-3.5 px-4 rounded-lg text-white font-semibold shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-1 transition-all transform hover:-translate-y-0.5 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-2">
                    <span>Login</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>

            </form>

            <!-- Footer Links -->
            <div class="mt-8 text-center text-sm text-slate-500">
                <span id="register-hint">
                    Don't have an account?
                    <a href="#" id="register-link"
                        class="font-semibold hover:underline decoration-2 underline-offset-2 transition-colors">Register
                        here</a>
                </span>
                <div class="mt-4">
                    <a href="#" class="text-xs text-slate-400 hover:text-slate-600">Forgot password?</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Logic -->
    <script type="module">
        // Use standard imports supported by the Import Map
        import { auth, db } from './firebase.js';
        import { signInWithEmailAndPassword, signOut } from "firebase/auth";
        import { doc, getDoc } from "firebase/firestore";

        // ---------------------------------------------------------------------
        // 1. ROLE & UI CONFIGURATION
        // ---------------------------------------------------------------------
        const ADMIN_UID = "lGAwpCUTO1fd13aeJef9oSbjDej2";

        const params = new URLSearchParams(window.location.search);
        let currentRole = params.get('role');

        // Fallback or Validation
        const validRoles = ['student', 'staff', 'worker', 'admin'];
        if (!currentRole || !validRoles.includes(currentRole)) {
            // If accessed directly without role, verify session or redirect
            currentRole = sessionStorage.getItem('selectedRole');
            if (!currentRole) {
                window.location.href = 'role-select.html';
            }
        }

        // Role-Specific Styles
        const roleConfig = {
            student: {
                name: 'Student',
                color: 'indigo',
                icon: 'fa-graduation-cap',
                cssVar: '#4f46e5',
                dash: 'student-dashboard.html'
            },
            staff: {
                name: 'Faculty / Staff',
                color: 'violet',
                icon: 'fa-chalkboard-user',
                cssVar: '#7c3aed',
                dash: 'staff-dashboard.html'
            },
            worker: {
                name: 'Maintenance Worker',
                color: 'teal',
                icon: 'fa-helmet-safety',
                cssVar: '#0d9488',
                dash: 'worker-dashboard.html'
            },
            admin: {
                name: 'Administrator',
                color: 'amber',
                icon: 'fa-user-shield',
                cssVar: '#d97706',
                dash: 'admin-dashboard.html',
                noRegister: true // Admin cannot self-register
            }
        };

        const config = roleConfig[currentRole];

        // Apply UI Themes
        document.documentElement.style.setProperty('--accent-color', config.cssVar);

        // Update Badges & Text
        document.getElementById('role-name').textContent = config.name;
        document.getElementById('role-badge').className = `mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-wide uppercase bg-${config.color}-50 text-${config.color}-600 border border-${config.color}-100`;
        document.getElementById('role-badge').innerHTML = `<i class="fa-solid ${config.icon} mr-2"></i> ${config.name}`;

        // Update Accent Line & Button
        document.getElementById('accent-line').className = `absolute top-0 left-0 w-full h-1.5 bg-${config.color}-500`;
        const btn = document.getElementById('submit-btn');
        btn.className = `w-full py-3.5 px-4 rounded-lg text-white font-semibold shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-${config.color}-500 focus:ring-offset-1 transition-all transform hover:-translate-y-0.5 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-2 bg-${config.color}-600 hover:bg-${config.color}-700`;

        // Update Links
        const regLink = document.getElementById('register-link');
        regLink.href = `register.html?role=${currentRole}`;
        regLink.className = `font-semibold text-${config.color}-600 hover:text-${config.color}-800 hover:underline decoration-2 underline-offset-2 transition-colors`;

        // Hide register option for Admins
        if (config.noRegister) {
            document.getElementById('register-hint').style.display = 'none';
        }

        // ---------------------------------------------------------------------
        // 2. AUTHENTICATION LOGIC
        // ---------------------------------------------------------------------
        const form = document.getElementById('login-form');
        const errorContainer = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous errors
            showError(null);
            setLoading(true);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // A. Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // B. Role Verification (Critical)
                // If it's an admin login, we might skip Firestore check IF predefined, 
                // but for security we should verify they are actually an admin.

                if (currentRole === 'admin') {

                    if (user.uid !== ADMIN_UID) {
                        throw new Error("Unauthorized admin access.");
                    }

                    showSuccess();
                    setTimeout(() => {
                        window.location.href = config.dash;
                    }, 800);
                }
                else {
                    // Fetch User Profile
                    const userDocRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userDocRef);

                    if (userDoc.exists()) {
                        const userData = userDoc.data();

                        // Check if the stored role matches the login attempt role
                        if (userData.role === currentRole) {
                            // Success!
                            showSuccess();
                            setTimeout(() => {
                                window.location.href = config.dash;
                            }, 1000);
                        } else {
                            // Role Mismatch (e.g., Student trying to login as Staff)
                            throw new Error(`Role mismatch. You are registered as a ${userData.role || 'different user'}.`);
                        }
                    } else {
                        // Edge Case: User auth exists but Firestore profile missing
                        // Allow login if roles are generic, but usually throw error
                        throw new Error("User profile not found. Please contact support.");
                    }
                }

            } catch (error) {
                console.error("Login Error:", error);

                // Handle Firebase specific error codes
                let msg = error.message;
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    msg = "Invalid email or password.";
                    // Added detailed hint for Admin troubleshooting
                    if (currentRole === 'admin') {
                        msg += " (Ensure Admin account exists in Firebase Console > Authentication)";
                    }
                } else if (error.code === 'auth/too-many-requests') {
                    msg = "Too many failed attempts. Try again later.";
                }

                showError(msg);

                // If role mismatch or other logic error, ensure we sign out
                if (!msg.includes("Invalid email")) {
                    await signOut(auth);
                }
            } finally {
                setLoading(false);
            }
        });

        // ---------------------------------------------------------------------
        // 3. UI HELPERS
        // ---------------------------------------------------------------------
        function setLoading(isLoading) {
            const btn = document.getElementById('submit-btn');
            const span = btn.querySelector('span');
            const icon = btn.querySelector('i');

            if (isLoading) {
                btn.disabled = true;
                span.textContent = 'Authenticating...';
                icon.className = 'fa-solid fa-circle-notch animate-spin-slow';
            } else {
                btn.disabled = false;
                span.textContent = 'Login';
                icon.className = 'fa-solid fa-arrow-right-to-bracket';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            const txt = el.querySelector('span');

            if (msg) {
                txt.textContent = msg;
                el.classList.remove('hidden');
                el.classList.add('animate-shake');

                // Reset shake animation after it runs
                setTimeout(() => {
                    el.classList.remove('animate-shake');
                }, 500);
            } else {
                el.classList.add('hidden');
            }
        }

        function showSuccess() {
            const btn = document.getElementById('submit-btn');
            btn.className = "w-full py-3.5 px-4 rounded-lg text-white font-semibold bg-green-500 shadow-md flex justify-center items-center gap-2";
            btn.innerHTML = `<span>Success!</span> <i class="fa-solid fa-check"></i>`;
        }

    </script>
</body>

</html>
